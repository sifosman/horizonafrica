version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      # TODO: Change password before go-live
      # - N8N_BASIC_AUTH_PASSWORD=<strong-password>
      - N8N_HOST=n8n.horizonafrica.co.za
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.horizonafrica.co.za/
      - GENERIC_TIMEZONE=Africa/Johannesburg
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
