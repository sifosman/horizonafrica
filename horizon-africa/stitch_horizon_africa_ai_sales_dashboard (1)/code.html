<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        .login-card {
            box-shadow: 0px 10px 30px -5px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .auth-bg-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-[#131b2e] min-h-screen flex items-center justify-center font-body-md text-on-background relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute inset-0 auth-bg-pattern pointer-events-none"></div>
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-tertiary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<main class="w-full max-w-md px-stack-md z-10">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-stack-lg rounded-xl login-card">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-stack-lg">
<img alt="Horizon Africa Logo" class="h-10 mb-stack-md brightness-0 invert" src="https://lh3.googleusercontent.com/aida/AP1WRLsjY2-RR4GyeA8CwuHxPHgsWn90peVXb7ybAEQVeVwoNpvSAROhqvwuBjeDqnNWTDYfEnr9nbhV327_NnVLsFmIlsktmnZVa_BDT2GfKSbyIM7kGGDV152frLMdBpA1MSpaNocoWnkf1D1A5KPGltNKo3RlDPZI1NjvOJTGiSRl42ppVYmFDDrRV4PFvmCbe2Mca892ycGUMoaj_2McmV2qXxKsDvREPanwQFQoW0uyNLzbhi9tiH5kE20"/>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-1">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in</p>
</div>
</div>
<!-- Login Form -->
<form action="#" class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white/5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all outline-none text-body-md font-body-md text-white placeholder-on-surface-variant/50" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
<input class="w-full pl-10 pr-12 py-2.5 bg-white/5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all outline-none text-body-md font-body-md text-white placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-outline-variant bg-white/5 text-primary-container focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me</label>
</div>
<a class="font-body-sm text-body-sm text-primary-container font-semibold hover:underline decoration-primary-container" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-[16px] py-3 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg" type="submit">
                Sign In
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-on-surface-variant">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary CTA: Google -->
<button class="w-full bg-white/5 border border-outline-variant text-on-surface font-body-md text-body-md py-3 rounded-lg hover:bg-white/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign in with Google
            </button>
</form>
<!-- Footer Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary-container font-semibold hover:underline decoration-primary-container" href="#">Contact Administrator</a>
</p>
</div>
</div>
<!-- Security Badge -->
<div class="mt-stack-md flex items-center justify-center gap-2 opacity-40 transition-all hover:opacity-100">
<span class="material-symbols-outlined text-[16px] text-on-surface">verified_user</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface">Enterprise Secure</span>
</div>
</main>
<!-- Simple Interactivity -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const passwordInput = document.getElementById('password');
        const toggleBtn = passwordInput?.nextElementSibling;

        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleBtn.querySelector('.material-symbols-outlined').textContent = 
                    type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
        
        // Interaction visual feedback on form focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.add('text-primary-container');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.remove('text-primary-container');
            });
        });
    });
</script>
</body></html>
